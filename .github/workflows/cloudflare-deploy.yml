name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    
    env:
      BUILD_TARGET: "cloudflare"
      NODE_ENV: "production"
      NEXT_PUBLIC_STORAGE_TYPE: ${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}
      # NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
      # NEXT_PUBLIC_SEARCH_MAX_PAGE: ${{ secrets.NEXT_PUBLIC_SEARCH_MAX_PAGE }}
      # NEXT_PUBLIC_DOUBAN_PROXY_TYPE: ${{ secrets.NEXT_PUBLIC_DOUBAN_PROXY_TYPE }}
      # NEXT_PUBLIC_DOUBAN_PROXY: ${{ secrets.NEXT_PUBLIC_DOUBAN_PROXY }}
      # NEXT_PUBLIC_DOUBAN_IMAGE_PROXY_TYPE: ${{ secrets.NEXT_PUBLIC_DOUBAN_IMAGE_PROXY_TYPE }}
      # NEXT_PUBLIC_DOUBAN_IMAGE_PROXY: ${{ secrets.NEXT_PUBLIC_DOUBAN_IMAGE_PROXY }}
      # NEXT_PUBLIC_DISABLE_YELLOW_FILTER: ${{ secrets.NEXT_PUBLIC_DISABLE_YELLOW_FILTER }}
      # NEXT_PUBLIC_FLUID_SEARCH: ${{ secrets.NEXT_PUBLIC_FLUID_SEARCH }}
      # NEXT_PUBLIC_PROXY_M3U8_TOKEN: ${{ secrets.NEXT_PUBLIC_PROXY_M3U8_TOKEN }}
      # NEXT_PUBLIC_DANMAKU_CACHE_EXPIRE_MINUTES: ${{ secrets.NEXT_PUBLIC_DANMAKU_CACHE_EXPIRE_MINUTES }}
      # NEXT_PUBLIC_VOICE_CHAT_STRATEGY: ${{ secrets.NEXT_PUBLIC_VOICE_CHAT_STRATEGY }}
      # NEXT_PUBLIC_ENABLE_OFFLINE_DOWNLOAD: ${{ secrets.NEXT_PUBLIC_ENABLE_OFFLINE_DOWNLOAD }}
      # NEXT_PUBLIC_ENABLE_SOURCE_SEARCH: ${{ secrets.NEXT_PUBLIC_ENABLE_SOURCE_SEARCH }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare
        run: pnpm run build:cloudflare --dangerouslyUseUnsupportedNextVersion
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          CRON_PASSWORD: ${{ secrets.CRON_PASSWORD }}
          CRON_WAIT_FOR_COMPLETION: ${{ secrets.CRON_WAIT_FOR_COMPLETION }}
          SITE_BASE: ${{ secrets.SITE_BASE }}
          CONFIG_SUBSCRIPTION_URL: ${{ secrets.CONFIG_SUBSCRIPTION_URL }}

      - name: Run D1 Database Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          STORAGE_TYPE="${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}"
          D1_ID="${{ secrets.D1_DATABASE_ID }}"

          if [ "$STORAGE_TYPE" != "d1" ]; then
            echo "Storage type is not d1 (current: $STORAGE_TYPE), skipping D1 migrations."
            exit 0
          fi

          if [ -z "$D1_ID" ]; then
            echo "❌ Fatal Error: Storage type is 'd1' but D1_DATABASE_ID secret is missing!"
            exit 1
          fi

          echo "Running D1 database migrations..."
          pnpm dlx wrangler d1 migrations apply moontvplus --remote
          echo "✅ Migrations completed"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: "4"
          secrets: |
            USERNAME
            PASSWORD
            UPSTASH_URL
            UPSTASH_TOKEN
            CRON_PASSWORD
            CRON_WAIT_FOR_COMPLETION
            SITE_BASE
            CONFIG_SUBSCRIPTION_URL
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          # TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # TMDB_PROXY: ${{ secrets.TMDB_PROXY }}
          # TMDB_REVERSE_PROXY: ${{ secrets.TMDB_REVERSE_PROXY }}
          # DANMAKU_API_BASE: ${{ secrets.DANMAKU_API_BASE }}
          # DANMAKU_API_TOKEN: ${{ secrets.DANMAKU_API_TOKEN }}
          # ANNOUNCEMENT: ${{ secrets.ANNOUNCEMENT }}
          CRON_PASSWORD: ${{ secrets.CRON_PASSWORD }}
          CRON_WAIT_FOR_COMPLETION: ${{ secrets.CRON_WAIT_FOR_COMPLETION }}
          SITE_BASE: ${{ secrets.SITE_BASE }}
          # REDIS_URL: ${{ secrets.REDIS_URL }}
          # KVROCKS_URL: ${{ secrets.KVROCKS_URL }}
          # INIT_CONFIG: ${{ secrets.INIT_CONFIG }}
          CONFIG_SUBSCRIPTION_URL: ${{ secrets.CONFIG_SUBSCRIPTION_URL }}
          # ENABLE_TVBOX_SUBSCRIBE: ${{ secrets.ENABLE_TVBOX_SUBSCRIBE }}
          # TVBOX_SUBSCRIBE_TOKEN: ${{ secrets.TVBOX_SUBSCRIBE_TOKEN }}
          # WATCH_ROOM_ENABLED: ${{ secrets.WATCH_ROOM_ENABLED }}
          # WATCH_ROOM_SERVER_TYPE: ${{ secrets.WATCH_ROOM_SERVER_TYPE }}
          # WATCH_ROOM_EXTERNAL_SERVER_URL: ${{ secrets.WATCH_ROOM_EXTERNAL_SERVER_URL }}
          # WATCH_ROOM_EXTERNAL_SERVER_AUTH: ${{ secrets.WATCH_ROOM_EXTERNAL_SERVER_AUTH }}
          # D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
